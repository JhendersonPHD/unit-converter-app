<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f43f5e;
            --primary-dark: #e11d48;
            --primary-light: #fb7185;
            --bg: #09090b;
            --card-bg: #18181b;
            --card-bg-hover: #27272a;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --border: #3f3f46;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(ellipse at 25% 25%, rgba(244, 63, 94, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 75%, rgba(244, 63, 94, 0.08) 0%, transparent 50%);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--bg);
            padding: 0.5rem;
            border-radius: 12px;
        }

        .category-tab {
            flex: 1;
            min-width: 80px;
            padding: 0.75rem 1rem;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .category-tab span {
            font-size: 1.25rem;
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
        }

        .category-tab:hover:not(.active) {
            background: var(--card-bg-hover);
        }

        .converter {
            display: none;
        }

        .converter.active {
            display: block;
        }

        .converter-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 1rem;
            align-items: end;
        }

        @media (max-width: 600px) {
            .converter-grid {
                grid-template-columns: 1fr;
            }
            .swap-btn {
                justify-self: center;
                transform: rotate(90deg);
            }
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem;
            padding-right: 4rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 1.25rem;
            font-weight: 600;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-wrapper select {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.5rem 0.75rem;
            background: var(--card-bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .swap-btn {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .swap-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.1) rotate(180deg);
        }

        .result-display {
            background: var(--bg);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 1.5rem;
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-light);
            word-break: break-all;
        }

        .result-unit {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .common-values {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .common-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .common-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.5rem;
        }

        .common-btn {
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .common-btn:hover {
            border-color: var(--primary);
            color: var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📐 Unit Converter</h1>
            <p class="subtitle">Convert between units instantly</p>
        </header>

        <div class="card">
            <div class="category-tabs">
                <button class="category-tab active" data-category="length"><span>📏</span>Length</button>
                <button class="category-tab" data-category="weight"><span>⚖️</span>Weight</button>
                <button class="category-tab" data-category="temperature"><span>🌡️</span>Temp</button>
                <button class="category-tab" data-category="volume"><span>🧪</span>Volume</button>
                <button class="category-tab" data-category="area"><span>📐</span>Area</button>
                <button class="category-tab" data-category="speed"><span>🚀</span>Speed</button>
                <button class="category-tab" data-category="time"><span>⏱️</span>Time</button>
                <button class="category-tab" data-category="digital"><span>💾</span>Data</button>
            </div>

            <!-- Length Converter -->
            <div class="converter active" data-category="length">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="length-from" value="1">
                            <select id="length-from-unit">
                                <option value="meter" selected>Meter</option>
                                <option value="kilometer">Kilometer</option>
                                <option value="centimeter">Centimeter</option>
                                <option value="millimeter">Millimeter</option>
                                <option value="mile">Mile</option>
                                <option value="yard">Yard</option>
                                <option value="foot">Foot</option>
                                <option value="inch">Inch</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="length">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="length-to" readonly>
                            <select id="length-to-unit">
                                <option value="meter">Meter</option>
                                <option value="kilometer" selected>Kilometer</option>
                                <option value="centimeter">Centimeter</option>
                                <option value="millimeter">Millimeter</option>
                                <option value="mile">Mile</option>
                                <option value="yard">Yard</option>
                                <option value="foot">Foot</option>
                                <option value="inch">Inch</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Weight Converter -->
            <div class="converter" data-category="weight">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="weight-from" value="1">
                            <select id="weight-from-unit">
                                <option value="kilogram" selected>Kilogram</option>
                                <option value="gram">Gram</option>
                                <option value="milligram">Milligram</option>
                                <option value="pound">Pound</option>
                                <option value="ounce">Ounce</option>
                                <option value="ton">Metric Ton</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="weight">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="weight-to" readonly>
                            <select id="weight-to-unit">
                                <option value="kilogram">Kilogram</option>
                                <option value="gram">Gram</option>
                                <option value="milligram">Milligram</option>
                                <option value="pound" selected>Pound</option>
                                <option value="ounce">Ounce</option>
                                <option value="ton">Metric Ton</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Temperature Converter -->
            <div class="converter" data-category="temperature">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="temp-from" value="0">
                            <select id="temp-from-unit">
                                <option value="celsius" selected>°C</option>
                                <option value="fahrenheit">°F</option>
                                <option value="kelvin">K</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="temp">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="temp-to" readonly>
                            <select id="temp-to-unit">
                                <option value="celsius">°C</option>
                                <option value="fahrenheit" selected>°F</option>
                                <option value="kelvin">K</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Volume Converter -->
            <div class="converter" data-category="volume">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="volume-from" value="1">
                            <select id="volume-from-unit">
                                <option value="liter" selected>Liter</option>
                                <option value="milliliter">Milliliter</option>
                                <option value="gallon">Gallon (US)</option>
                                <option value="quart">Quart</option>
                                <option value="pint">Pint</option>
                                <option value="cup">Cup</option>
                                <option value="fluid_oz">Fluid oz</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="volume">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="volume-to" readonly>
                            <select id="volume-to-unit">
                                <option value="liter">Liter</option>
                                <option value="milliliter">Milliliter</option>
                                <option value="gallon" selected>Gallon (US)</option>
                                <option value="quart">Quart</option>
                                <option value="pint">Pint</option>
                                <option value="cup">Cup</option>
                                <option value="fluid_oz">Fluid oz</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Area Converter -->
            <div class="converter" data-category="area">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="area-from" value="1">
                            <select id="area-from-unit">
                                <option value="sqmeter" selected>Square Meter</option>
                                <option value="sqkilometer">Square Km</option>
                                <option value="sqfoot">Square Foot</option>
                                <option value="sqinch">Square Inch</option>
                                <option value="acre">Acre</option>
                                <option value="hectare">Hectare</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="area">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="area-to" readonly>
                            <select id="area-to-unit">
                                <option value="sqmeter">Square Meter</option>
                                <option value="sqkilometer" selected>Square Km</option>
                                <option value="sqfoot">Square Foot</option>
                                <option value="sqinch">Square Inch</option>
                                <option value="acre">Acre</option>
                                <option value="hectare">Hectare</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Speed Converter -->
            <div class="converter" data-category="speed">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="speed-from" value="1">
                            <select id="speed-from-unit">
                                <option value="mph" selected>MPH</option>
                                <option value="kph">KPH</option>
                                <option value="mps">m/s</option>
                                <option value="knots">Knots</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="speed">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="speed-to" readonly>
                            <select id="speed-to-unit">
                                <option value="mph">MPH</option>
                                <option value="kph" selected>KPH</option>
                                <option value="mps">m/s</option>
                                <option value="knots">Knots</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Time Converter -->
            <div class="converter" data-category="time">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="time-from" value="1">
                            <select id="time-from-unit">
                                <option value="second" selected>Second</option>
                                <option value="minute">Minute</option>
                                <option value="hour">Hour</option>
                                <option value="day">Day</option>
                                <option value="week">Week</option>
                                <option value="month">Month</option>
                                <option value="year">Year</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="time">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="time-to" readonly>
                            <select id="time-to-unit">
                                <option value="second">Second</option>
                                <option value="minute">Minute</option>
                                <option value="hour" selected>Hour</option>
                                <option value="day">Day</option>
                                <option value="week">Week</option>
                                <option value="month">Month</option>
                                <option value="year">Year</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Digital Storage Converter -->
            <div class="converter" data-category="digital">
                <div class="converter-grid">
                    <div class="input-group">
                        <label>From</label>
                        <div class="input-wrapper">
                            <input type="number" id="digital-from" value="1">
                            <select id="digital-from-unit">
                                <option value="byte" selected>Byte</option>
                                <option value="kilobyte">KB</option>
                                <option value="megabyte">MB</option>
                                <option value="gigabyte">GB</option>
                                <option value="terabyte">TB</option>
                                <option value="bit">Bit</option>
                            </select>
                        </div>
                    </div>
                    <button class="swap-btn" data-swap="digital">⇄</button>
                    <div class="input-group">
                        <label>To</label>
                        <div class="input-wrapper">
                            <input type="number" id="digital-to" readonly>
                            <select id="digital-to-unit">
                                <option value="byte">Byte</option>
                                <option value="kilobyte">KB</option>
                                <option value="megabyte" selected>MB</option>
                                <option value="gigabyte">GB</option>
                                <option value="terabyte">TB</option>
                                <option value="bit">Bit</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Conversion factors (to base unit)
        const conversions = {
            length: {
                meter: 1,
                kilometer: 1000,
                centimeter: 0.01,
                millimeter: 0.001,
                mile: 1609.344,
                yard: 0.9144,
                foot: 0.3048,
                inch: 0.0254
            },
            weight: {
                kilogram: 1,
                gram: 0.001,
                milligram: 0.000001,
                pound: 0.453592,
                ounce: 0.0283495,
                ton: 1000
            },
            volume: {
                liter: 1,
                milliliter: 0.001,
                gallon: 3.78541,
                quart: 0.946353,
                pint: 0.473176,
                cup: 0.236588,
                fluid_oz: 0.0295735
            },
            area: {
                sqmeter: 1,
                sqkilometer: 1000000,
                sqfoot: 0.092903,
                sqinch: 0.00064516,
                acre: 4046.86,
                hectare: 10000
            },
            speed: {
                mph: 1,
                kph: 0.621371,
                mps: 2.23694,
                knots: 1.15078
            },
            time: {
                second: 1,
                minute: 60,
                hour: 3600,
                day: 86400,
                week: 604800,
                month: 2629746,
                year: 31556952
            },
            digital: {
                byte: 1,
                kilobyte: 1024,
                megabyte: 1048576,
                gigabyte: 1073741824,
                terabyte: 1099511627776,
                bit: 0.125
            }
        };

        // Temperature conversions (special)
        function convertTemp(value, from, to) {
            let celsius;
            // Convert to Celsius first
            if (from === 'celsius') celsius = value;
            else if (from === 'fahrenheit') celsius = (value - 32) * 5/9;
            else if (from === 'kelvin') celsius = value - 273.15;
            
            // Convert from Celsius to target
            if (to === 'celsius') return celsius;
            else if (to === 'fahrenheit') return celsius * 9/5 + 32;
            else if (to === 'kelvin') return celsius + 273.15;
        }

        function convert(value, from, to, category) {
            if (category === 'temperature') {
                return convertTemp(value, from, to);
            }
            
            const fromFactor = conversions[category][from];
            const toFactor = conversions[category][to];
            
            // Convert to base unit, then to target
            const baseValue = value * fromFactor;
            return baseValue / toFactor;
        }

        // Category switching
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.converter').forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.querySelector(`.converter[data-category="${tab.dataset.category}"]`).classList.add('active');
            });
        });

        // Swap units
        document.querySelectorAll('.swap-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const category = btn.dataset.swap;
                const fromInput = document.getElementById(`${category}-from`);
                const toInput = document.getElementById(`${category}-to`);
                const fromSelect = document.getElementById(`${category}-from-unit`);
                const toSelect = document.getElementById(`${category}-to-unit`);
                
                // Swap values
                const tempValue = fromInput.value;
                fromInput.value = toInput.value;
                toInput.value = tempValue;
                
                // Swap selections
                const tempSelect = fromSelect.value;
                fromSelect.value = toSelect.value;
                toSelect.value = tempSelect;
                
                // Recalculate
                calculate(category);
            });
        });

        // Calculation function
        function calculate(category) {
            const fromInput = document.getElementById(`${category}-from`);
            const toInput = document.getElementById(`${category}-to`);
            const fromSelect = document.getElementById(`${category}-from-unit`);
            const toSelect = document.getElementById(`${category}-to-unit`);
            
            const value = parseFloat(fromInput.value);
            if (isNaN(value)) {
                toInput.value = '';
                return;
            }
            
            const result = convert(value, fromSelect.value, toSelect.value, category);
            
            // Format result
            if (Math.abs(result) < 0.0001 || Math.abs(result) > 999999999) {
                toInput.value = result.toExponential(6);
            } else {
                toInput.value = parseFloat(result.toFixed(6));
            }
        }

        // Add event listeners for all inputs
        ['length', 'weight', 'temperature', 'volume', 'area', 'speed', 'time', 'digital'].forEach(category => {
            const fromInput = document.getElementById(`${category}-from`);
            const toInput = document.getElementById(`${category}-to`);
            const fromSelect = document.getElementById(`${category}-from-unit`);
            const toSelect = document.getElementById(`${category}-to-unit`);
            
            fromInput.addEventListener('input', () => calculate(category));
            toInput.addEventListener('input', () => {
                // Reverse calculation
                const value = parseFloat(toInput.value);
                if (isNaN(value)) {
                    fromInput.value = '';
                    return;
                }
                const result = convert(value, toSelect.value, fromSelect.value, category);
                fromInput.value = parseFloat(result.toFixed(6));
            });
            
            fromSelect.addEventListener('change', () => calculate(category));
            toSelect.addEventListener('change', () => calculate(category));
        });

        // Initial calculations
        ['length', 'weight', 'temperature', 'volume', 'area', 'speed', 'time', 'digital'].forEach(calculate);
    </script>
</body>
</html>
